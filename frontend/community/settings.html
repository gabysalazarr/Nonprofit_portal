<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — Community Support</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row" style="align-items:center; gap:12px;">
        <img src="../images/bastrop_logo.png" alt="Bastrop Nonprofit logo" style="height:75px;width:125px;max-width:160px;object-fit:contain;" />
        <span class="brand-name"></span>
      </div>
      <span class="org-chip" id="sidebar-org-chip"></span>
    </div>
    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">My Portal</div>
        <a class="nav-item" href="dashboard.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item" href="reports.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
        <a class="nav-item" href="announcements.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Announcements
        </a>
        <a class="nav-item" href="messages.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
          <span class="nav-badge purple" id="nav-badge-messages"></span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a class="nav-item active" href="settings.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-avi" style="background:#0953b4;"></div>
      <div style="min-width:0;">
        <div class="user-name"></div>
        <div class="user-org_name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
      </div>
      <a class="sign-out" href="#" onclick="signOut()" title="Sign out">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title">Settings</div>
        <div class="page-sub">Account & preferences</div>
      </div>
    </header>
    <div class="content">
      <div style="max-width:500px;display:flex;flex-direction:column;gap:16px;">
        <div class="card">
          <div class="card-header"><div class="card-title">Profile</div></div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">Full name</label><input class="form-input" value="John Doe" /></div>
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" value="email@cs.org" /></div>
            <div class="form-group"><label class="form-label">Community Support</label><input class="form-input" value="Cmty Support #1" /></div>
            <button class="btn btn-primary">Save changes</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Notifications</div></div>
          <div class="card-body">
            <div class="vis-row"><span style="font-size:13px;">Email notifications for new messages</span><div class="toggle on" onclick="toggleSwitch(this)"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/shared.js"></script>
<script src="../js/storage.js"></script>
<script>
  if (!requireRole('community-support')) throw new Error('Not authorized');
  async function init() {
    const _user = await refreshUser();
    if (_user) {
      const roleLabels = {
        'manager': 'Manager',
        'community-essential': 'Community Essential',
        'community-support': 'Community Support',
      };
      const nameEl = document.querySelector('.user-name');
      const roleEl = document.querySelector('.user-role');
      const orgEl = document.querySelector('.user-org_name');
      const aviEl = document.querySelector('.user-avi');
      const chipEl = document.getElementById('sidebar-org-chip');
      if (chipEl) chipEl.textContent = roleLabels[_user.role] || _user.role;
      if (nameEl) nameEl.textContent = _user.name;
      if (roleEl) roleEl.textContent = roleLabels[_user.role] || _user.role;
      if (orgEl) orgEl.textContent = _user.org_name || '';
      if (aviEl) aviEl.textContent = _user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    }
    const [allSubs, unreadMsgCount] = await Promise.all([ getSubmissions(), getUnreadCount(),]);
    const pendingSubsCount = allSubs.filter(s => (s.status || 'Pending') === 'Pending').length;
    const msgsBadge = document.getElementById('nav-badge-messages');
    if (msgsBadge) {
      msgsBadge.textContent = unreadMsgCount;
      msgsBadge.style.display = unreadMsgCount > 0 ? '' : 'none';
    }
  }
  init();
</script>
</body>
</html>
