<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bastrop Portal — Sign in</title>
<link rel="stylesheet" href="css/styles.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  body::before { content:''; position:absolute; top:-120px; right:-120px; width:500px; height:500px; border-radius:50%; background:var(--accent-light); opacity:0.5; }
  body::after { content:''; position:absolute; bottom:-80px; left:-80px; width:350px; height:350px; border-radius:50%; background:var(--accent-light); opacity:0.4; }

  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 44px; width: 440px; position: relative; z-index: 1; }
  .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .login-heading { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  .btn-login { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
  .btn-login:hover { background: var(--accent-hover); }
  .btn-login.community { background: var(--accent); }
  .btn-login.community:hover { background: var(--accent); }

  .login-footer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text3); }
  .login-footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-brand">
    <img src="images/bastrop_logo.png" alt="Portal logo" style="height:50px;width:auto;max-width:140px;object-fit:contain;" />
    <span class="brand-name" style="font-family:'Playfair Display',serif;font-size:25px;font-weight:500;">Bastrop Portal</span>
  </div>

  <div class="login-heading">Welcome back</div>
  <div class="login-sub">Sign in to your portal</div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" type="email" placeholder="you@example.org" id="email-input" />
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" id="pw-input" />
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in</button>

  <div class="login-footer">
    Trouble signing in? <a href="#">Contact your manager</a>
  </div>
</div>

<script>
  const existingToken = localStorage.getItem('token');
  const existingUser = JSON.parse(localStorage.getItem('user') || 'null');
  if (existingToken && existingUser) {
    if (existingUser.role === 'manager') window.location.href = 'manager/dashboard.html';
    else if (existingUser.role === 'community-support') window.location.href = 'community/dashboard.html';
    else window.location.href = 'nonprofit/dashboard.html';
  }
  const API = 'http://localhost:3000/api';
  let selectedRole = 'essential';

  // Formal notification helper
  function showFormMessage(message, type = 'error') {
    let msgBox = document.getElementById('login-message-banner');
    
    // Create the banner if it doesn't exist yet
    if (!msgBox) {
      msgBox = document.createElement('div');
      msgBox.id = 'login-message-banner';
      // Insert it right before the email input container
      const emailInput = document.getElementById('email-input');
      emailInput.parentNode.insertBefore(msgBox, emailInput);
    }
    
    msgBox.textContent = message;
    // Apply clean structural styles (add your own CSS classes here if preferred)
    msgBox.style.padding = '12px';
    msgBox.style.marginBottom = '16px';
    msgBox.style.borderRadius = '4px';
    msgBox.style.fontSize = '14px';
    msgBox.style.fontWeight = '500';
    
    if (type === 'error') {
      msgBox.style.backgroundColor = '#fdf2f2';
      msgBox.style.color = '#9b1c1c';
      msgBox.style.border = '1px solid #f8b4b4';
    }
    
    msgBox.style.display = 'block';
  }

  function clearFormMessage() {
    const msgBox = document.getElementById('login-message-banner');
    if (msgBox) msgBox.style.display = 'none';
  }


  async function doLogin() {
    clearFormMessage();
    const email = document.getElementById('email-input').value.trim();
    const pw    = document.getElementById('pw-input').value;
    
    if (!email || !pw) { 
      showFormMessage('Please enter your email and password.'); 
      return; 
    }

    const btn = document.getElementById('login-btn');
    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pw })
      });

      const data = await res.json();

      if (!res.ok) {
        showFormMessage(data.error || 'Invalid email or password. Please try again.');
        btn.textContent = 'Sign in';
        btn.disabled = false;
        return;
      }

      // Save token and user info
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      // Redirect based on role
      const role = data.user.role;
      if (role === 'manager') {
        window.location.href = 'manager/dashboard.html';
      } else if (role === 'community-support') {
        window.location.href = 'community/dashboard.html';
      } else if (role === 'nonprofit' || role === 'community-essential') {
        window.location.href = 'nonprofit/dashboard.html';
      } else {
        showFormMessage(`Access Denied: The role profile "${role}" is not recognized by the system.`);
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }

    } catch (err) {
      showFormMessage('Server Unreachable: Connection could not be established. Please verify system status.');
      btn.textContent = 'Sign in';
      btn.disabled = false;
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>
