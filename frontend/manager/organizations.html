<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Organizations — Manager</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row" style="align-items:center; gap:12px;">
        <img src="../images/bastrop_logo.png" alt="Bastrop Nonprofit logo" style="height:75px;width:125px;max-width:160px;object-fit:contain;" />
        <span class="brand-name"></span>
      </div>
      <span class="org-chip" id="sidebar-org-chip"></span>
    </div>
    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">Overview</div>
        <a class="nav-item" href="dashboard.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item active mgr" href="organizations.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Organizations
        </a>
        <a class="nav-item" href="announcements.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Announcements
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Content</div>
        <a class="nav-item" href="templates.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          Template Library
        </a>
        <a class="nav-item" href="submissions.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          Submissions
          <span class="nav-badge red">7</span>
        </a>
        <a class="nav-item" href="reports.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
        <a class="nav-item" href="messages.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
          <span class="nav-badge purple">5</span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Admin</div>
        <a class="nav-item" href="settings.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-avi mgr"></div>
      <div><div class="user-name"></div><div class="user-role"></div></div>
      <a class="sign-out" href="#" onclick="signOut()" title="Sign out">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title">Organizations</div>
        <div class="page-sub">All Registered Organizations</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-icon" style="position:relative;">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
        <button class="btn btn-primary mgr" onclick="openAddOrgModal()" id="add-btn">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Community Essential
        </button>
      </div>
    </header>

    <div class="content">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <!-- Role tabs -->
        <div class="tab-bar" style="margin-bottom:0;">
          <span class="tab-pill active" id="role-tab-np" onclick="switchRole('community-essential', this)">Community Essential</span>
          <span class="tab-pill" id="role-tab-cs" onclick="switchRole('community-support', this)">Community Support</span>
        </div>
        <!-- Status filter -->
        <div class="tab-bar" style="margin-bottom:0;">
          <span class="tab-pill active" id="status-tab-all" onclick="filterStatus('all', this)">All</span>
          <span class="tab-pill" id="status-tab-active" onclick="filterStatus('active', this)">Active</span>
          <span class="tab-pill" id="status-tab-inactive" onclick="filterStatus('inactive', this)">Inactive</span>
        </div>
      </div>

      <div class="org-grid" id="org-grid"></div>

      <div id="org-empty" style="display:none;text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;">
        No organizations match this filter.
      </div>

    </div>
  </div>

  <!-- Add Nonprofit Modal -->
  <div class="modal-overlay" id="add-org-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Add Community Essential</h3>
        <button class="modal-close" onclick="closeAddOrgModal()">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nonprofit name</label>
          <input class="form-input" id="org-name-input" placeholder="e.g. Organization Name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="org-email-input" placeholder="email@organization.org" />
        </div>
        <div class="form-group">
          <label class="form-label">Contact person</label>
          <input class="form-input" id="org-contact-input" placeholder="e.g. Gaby Salazar" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeAddOrgModal()">Cancel</button>
        <button class="btn btn-primary mgr" onclick="submitAddOrg()">Add Community Essential</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script>
  if (!requireRole('manager')) throw new Error('Not authorized');
  const AVATAR_COLORS = ['#3D2B6B','#2D5016','#B45309','#9B1C1C','#1e40af','#065f46','#7c3aed','#b45309'];
  let currentRole   = 'community-essential';
  let currentStatus = 'all';
  let allOrgs       = [];

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function getColor(index) {
    return AVATAR_COLORS[index % AVATAR_COLORS.length];
  }

  function buildCard(org, index) {
    const isActive = org.status === 'active';
    return `
      <div class="org-card" data-status="${org.status}">
        <div class="org-card-top">
          <div class="org-avi" style="background:${getColor(index)};">${initials(org.name)}</div>
          <div>
            <div class="org-name">${org.name}</div>
            <div class="org-contact">${org.email}</div>
          </div>
          ${isActive
            ? `<span class="pill pill-green" style="margin-left:auto;">Active</span>`
            : `<span class="pill pill-gray" style="margin-left:auto;">Inactive</span>`}
        </div>
        <div class="org-stats">
          <div class="org-stat"><span>${org.contact || '—'}</span></div>
          <button class="btn" style="margin-left:auto;font-size:11px;padding:3px 9px;" onclick="toggleStatus(${org.id}, '${org.status}')">
            ${isActive ? 'Deactivate' : 'Activate'}
          </button>
        </div>
      </div>`;
  }

  async function loadOrgs() {
    const role = currentRole === 'community-essential' ? 'community-essential' : 'community-support';
    allOrgs = await getOrganizationsByRole(role);
    renderOrgs();
  }

  function renderOrgs() {
    const grid    = document.getElementById('org-grid');
    const empty   = document.getElementById('org-empty');
    const filtered = currentStatus === 'all' ? allOrgs : allOrgs.filter(o => o.status === currentStatus);

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = filtered.map((org, i) => buildCard(org, i)).join('');
  }

  function switchRole(role, el) {
    currentRole = role;
    document.getElementById('role-tab-np').classList.toggle('active', role === 'community-essential');
    document.getElementById('role-tab-cs').classList.toggle('active', role === 'community-support');
    currentStatus = 'all';
    document.querySelectorAll('#status-tab-all, #status-tab-active, #status-tab-inactive')
      .forEach(t => t.classList.remove('active'));
    document.getElementById('status-tab-all').classList.add('active');
    document.getElementById('add-btn').childNodes[2].textContent = role === 'community-essential' ? ' Add Community Essential' : ' Add Community Support';
    loadOrgs();
  }

  function filterStatus(status, el) {
    currentStatus = status;
    document.querySelectorAll('#status-tab-all, #status-tab-active, #status-tab-inactive')
      .forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderOrgs();
  }

  async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
    await updateOrgStatus(id, newStatus);
    loadOrgs();
  }

  function openAddOrgModal() {
    document.getElementById('add-org-modal').classList.add('open');
  }

  function closeAddOrgModal() {
    document.getElementById('add-org-modal').classList.remove('open');
    document.getElementById('org-name-input').value = '';
    document.getElementById('org-email-input').value = '';
    document.getElementById('org-contact-input').value = '';
  }

  async function submitAddOrg() {
    const name    = document.getElementById('org-name-input').value.trim();
    const email   = document.getElementById('org-email-input').value.trim();
    const contact = document.getElementById('org-contact-input').value.trim();
    if (!name || !email || !contact) { alert('Please fill in all fields.'); return; }

    const role = currentRole === 'community-essential' ? 'community-essential' : 'community-support';
    await createOrganization({ name, email, contact, role });
    closeAddOrgModal();
    loadOrgs();
  }

  async function init() {
    const _user = await refreshUser();
    if (_user) {
      const roleLabels = {
        'manager': 'Manager',
        'community-essential': 'Community Essential',
        'community-support': 'Community Support',
      };
      const nameEl = document.querySelector('.user-name');
      const roleEl = document.querySelector('.user-role');
      const aviEl = document.querySelector('.user-avi');
      if (nameEl) nameEl.textContent = _user.name;
      if (roleEl) roleEl.textContent = roleLabels[_user.role] || _user.role;
      if (aviEl) aviEl.textContent = _user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const chipEl = document.getElementById('sidebar-org-chip');
      if (chipEl) chipEl.textContent = roleLabels[_user.role] || _user.role;
    }
    loadOrgs();
  }

  init();
</script>
</body>
</html>
