<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Announcements — Community Essential</title>
<link rel="stylesheet" href="../css/styles.css" />
<style>
  .ann-board { display: flex; flex-direction: column; gap: 12px; }
  .ann-post { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; transition: box-shadow 0.15s; }
  .ann-post:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .ann-post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ann-avatar { width: 34px; height: 34px; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
  .ann-author { font-size: 13px; font-weight: 600; }
  .ann-role-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin-top: 2px; display: inline-block; }
  .ann-time { font-size: 11px; color: var(--text3); margin-left: auto; white-space: nowrap; }
  .ann-message { font-size: 13px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
  .ann-delete { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px 6px; border-radius: 6px; transition: all 0.15s; font-size: 11px; display: flex; align-items: center; gap: 4px; margin-left: 6px; flex-shrink: 0; }
  .ann-delete:hover { color: var(--red); background: var(--red-light); }
  .ann-delete svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
  .ann-empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; }
  .ann-empty svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.5; margin-bottom: 12px; display: block; margin-inline: auto; }
  .char-count { font-size: 11px; color: var(--text3); text-align: right; margin-top: 4px; }
  .post-btn-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row" style="align-items:center; gap:12px;">
        <img src="../images/bastrop_logo.png" alt="Portal logo" style="height:75px;width:125px;max-width:160px;object-fit:contain;" />
        <span class="brand-name"></span>
      </div>
      <span class="org-chip">Cmty Essential #1</span>
    </div>
    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">My Portal</div>
        <a class="nav-item" href="dashboard.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item" href="templates.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          My Templates
          <span class="nav-badge red">2</span>
        </a>
        <a class="nav-item" href="reports.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
        <a class="nav-item active" href="announcements.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Announcements
        </a>
        <a class="nav-item" href="messages.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
          <span class="nav-badge purple">3</span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a class="nav-item" href="settings.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-avi" style="background:var(--red);">JD</div>
      <div style="min-width:0;">
        <div class="user-name">Jane Doe</div>
        <div class="user-role" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Cmty Essential #1</div>
      </div>
      <a class="sign-out" href="../index.html" title="Sign out">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title">Announcements</div>
        <div class="page-sub">Shared board — visible to all users</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-icon" style="position:relative;">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
      </div>
    </header>

    <div class="content">
      <div class="two-col-narrow" style="grid-template-columns:1fr 300px;align-items:start;">

        <div id="ann-board" class="ann-board"></div>

        <div class="card">
          <div class="card-header"><div class="card-title">Post an announcement</div></div>
          <div class="card-body">
            <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">Posting as <strong>Nonprofit</strong>. All users will see this.</div>
            <textarea class="form-textarea form-input" id="ann-message" placeholder="Write your announcement…" rows="5" maxlength="500" oninput="updateCharCount()"></textarea>
            <div class="char-count"><span id="char-count">0</span> / 500</div>
            <div class="post-btn-row">
              <span style="font-size:11px;color:var(--text3);">Visible to everyone</span>
              <button class="btn btn-primary" onclick="postAnnouncement()">
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" style="width:13px;height:13px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
                Post
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/storage.js"></script>
<script>
  // Each session gets a unique post key so the nonprofit can delete their own posts
  // from this session. Since there's no real login, we use sessionStorage to track
  // which announcement IDs were posted in this browser session.
  const SESSION_KEY = 'np_session_posts';

  function getSessionPosts() {
    try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || []; }
    catch(e) { return []; }
  }

  function addSessionPost(id) {
    const posts = getSessionPosts();
    posts.push(id);
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(posts));
  }

  function updateCharCount() {
    document.getElementById('char-count').textContent = document.getElementById('ann-message').value.length;
  }

  function postAnnouncement() {
    const message = document.getElementById('ann-message').value.trim();
    if (!message) { alert('Please write something before posting.'); return; }
    const ann = addAnnouncement({ authorName: 'Nonprofit', authorRole: 'Nonprofit', message });
    addSessionPost(ann.id);
    document.getElementById('ann-message').value = '';
    updateCharCount();
    renderBoard();
  }

  function removeAnnouncement(id) {
    if (!confirm('Delete your announcement?')) return;
    deleteAnnouncement(id);
    const posts = getSessionPosts().filter(p => p !== id);
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(posts));
    renderBoard();
  }

  function roleStyle(role) {
    if (role === 'Manager') return 'background:var(--accent-light);color:var(--accent);';
    if (role === 'Community Support') return 'background:var(--purple-light);color:var(--purple);';
    return 'background:var(--surface2);color:var(--text2);';
  }

  function avatarColor(role) {
    if (role === 'Manager') return '#2D5016';
    if (role === 'Community Support') return '#3D2B6B';
    return '#B45309';
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function timeAgo(isoString) {
    const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return formatDate(isoString);
  }

  function renderBoard() {
    const announcements = getAnnouncements();
    const sessionPosts  = getSessionPosts();
    const board = document.getElementById('ann-board');

    if (announcements.length === 0) {
      board.innerHTML = `
        <div class="ann-empty">
          <svg viewBox="0 0 24 24"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <p>No announcements yet.<br>Be the first to post something.</p>
        </div>`;
      return;
    }

    board.innerHTML = announcements.map(a => {
      const canDelete = sessionPosts.includes(a.id);
      const deleteBtn = canDelete
        ? `<button class="ann-delete" onclick="removeAnnouncement('${a.id}')">
             <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
             Delete
           </button>`
        : '';
      return `
        <div class="ann-post">
          <div class="ann-post-header">
            <div class="ann-avatar" style="background:${avatarColor(a.authorRole)};">${initials(a.authorName)}</div>
            <div>
              <div class="ann-author">${a.authorName}</div>
              <span class="ann-role-tag" style="${roleStyle(a.authorRole)}">${a.authorRole}</span>
            </div>
            <div class="ann-time">${timeAgo(a.postedAt)}</div>
            ${deleteBtn}
          </div>
          <div class="ann-message">${a.message}</div>
        </div>`;
    }).join('');
  }

  renderBoard();
</script>
</body>
</html>
