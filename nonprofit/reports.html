<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports — Community Essential</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row" style="align-items:center; gap:12px;">
        <img src="../images/bastrop_logo.png" alt="Bastrop Nonprofit logo" style="height:75px;width:125px;max-width:160px;object-fit:contain;" />
        <span class="brand-name"></span>
      </div>
      <span class="org-chip">Cmty Essential #1</span>
    </div>
    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">My Portal</div>
        <a class="nav-item" href="dashboard.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item" href="templates.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          My Templates
          <span class="nav-badge red">2</span>
        </a>
        <a class="nav-item active" href="reports.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
        <a class="nav-item" href="announcements.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Announcements
        </a>
        <a class="nav-item" href="messages.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
          <span class="nav-badge purple">3</span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a class="nav-item" href="settings.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-avi" style="background:var(--red);">JD</div>
      <div style="min-width:0;">
        <div class="user-name">Jane Doe</div>
        <div class="user-role" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Cmty Essential #1</div>
      </div>
      <a class="sign-out" href="../index.html" title="Sign out">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title">Reports</div>
        <div class="page-sub">Shared reports from your manager</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-icon" style="position:relative;">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
      </div>
    </header>
    <div class="content">
      <div class="section-label">Reports from your manager</div>
      <div class="report-grid" id="reports-grid">
        <!-- populated by JS -->
      </div>
      <div id="reports-empty" style="display:none;text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" style="width:36px;height:36px;stroke:var(--text3);margin-bottom:12px;display:block;margin-inline:auto;"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        No reports have been shared with your organization yet.
      </div>
    </div>
  </div>
</div>
<script src="../js/storage.js"></script>
<script>
  // In production this comes from the authenticated session
  const MY_ORG = 'Nonprofit #1';

  function renderReports() {
    const reports = getReportsVisibleTo(MY_ORG)
      .sort((a,b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

    const grid  = document.getElementById('reports-grid');
    const empty = document.getElementById('reports-empty');
    const ICON_COLORS = ['green','purple','amber','blue'];

    if (reports.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = reports.map((r, i) => `
      <div class="report-card">
        <div class="rc-header">
          <div class="rc-icon ${ICON_COLORS[i % ICON_COLORS.length]}">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </div>
          <span class="pill pill-green">Visible</span>
        </div>
        <div class="rc-name">${r.name}</div>
        <div class="rc-meta">Shared ${formatDate(r.uploadedAt)}</div>
        <div class="rc-footer">
          <div class="dl-btn" onclick="downloadReport('${r.id}')">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </div>
        </div>
      </div>`).join('');
  }

  renderReports();
</script>
</body>
</html>
