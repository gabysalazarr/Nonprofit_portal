<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — ImpactHub</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row">
        <div class="brand-icon"><svg viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <span class="brand-name">ImpactHub</span>
      </div>
      <span class="org-chip">HopeWorks</span>
    </div>

    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">My Portal</div>
        <a class="nav-item" href="dashboard.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item" href="templates.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          My Templates
          <span class="nav-badge amber">2</span>
        </a>
        <a class="nav-item" href="messages.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
          <span class="nav-badge">3</span>
        </a>
        <a class="nav-item" href="reports.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reports
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a class="nav-item active" href="settings.html">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avi">HW</div>
      <div><div class="user-name">Sarah Kim</div><div class="user-role">HopeWorks</div></div>
      <a class="sign-out" href="../index.html" title="Sign out">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title">Settings</div>
        <div class="page-sub">Account & preferences</div>
      </div>
    </header>

    <div class="content">
      <div style="max-width:500px;display:flex;flex-direction:column;gap:16px;">
        <div class="card">
          <div class="card-header"><div class="card-title">Profile</div></div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">Full name</label><input class="form-input" value="Sarah Kim" /></div>
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" value="sarah@hopeworks.org" /></div>
            <div class="form-group"><label class="form-label">Organization</label><input class="form-input" value="HopeWorks" /></div>
            <button class="btn btn-primary">Save changes</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Notifications</div></div>
          <div class="card-body">
            <div class="vis-row"><span style="font-size:13px;">Email notifications for new messages</span><div class="toggle on" onclick="toggleSwitch(this)"></div></div>
            <div class="vis-row"><span style="font-size:13px;">Deadline reminders (3 days before)</span><div class="toggle on" onclick="toggleSwitch(this)"></div></div>
            <div class="vis-row"><span style="font-size:13px;">Submission status updates</span><div class="toggle on" onclick="toggleSwitch(this)"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
</body>
</html>
